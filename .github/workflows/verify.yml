name: Verify BrainSpa public shell

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Verify shell, build, and API tests
        env:
          BRAIN_SPA_DISABLE_TELEGRAM_POLLING: '1'
        run: npm run verify
