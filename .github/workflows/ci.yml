name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Build web app
        run: npm run build

      - name: Run API tests
        env:
          BRAIN_SPA_DISABLE_TELEGRAM_POLLING: "1"
        run: python -m pytest apps/api/tests -q
